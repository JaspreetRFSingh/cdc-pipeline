version: '3.8'
services:
  mysql:
    image: mysql:8.0
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: cdc_test
    ports:
      - "3306:3306"
    command: --log-bin=mysql-bin --binlog-format=ROW --server-id=1
  kafka:
    image: confluentinc/cp-kafka:7.4.0
    ports:
      - "9092:9092"
